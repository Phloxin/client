name: Build Client

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.vscode/**'
      - '.editorconfig'
      - '.gitignore'
      - '.prettierignore'
      - '.prettierrc.yaml'
      - '.env.example'
      - 'LICENSE'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            script: build:linux
          - os: windows-latest
            script: build:win
          - os: macos-latest
            script: build:mac

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install X11 build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libx11-dev libxtst-dev libxt-dev libxinerama-dev libxkbcommon-dev libxkbfile-dev \
            libxrandr-dev libx11-xcb-dev libxkbcommon-x11-dev \
            libpipewire-0.3-dev

      - name: Cache Electron binaries
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/audio-capture

      - name: Install dependencies
        run: npm ci

      - name: Build native audio addon
        run: npm run build:native

      - name: Verify native audio addon built
        shell: bash
        run: node -e "require('./native/audio-capture/index.js'); console.log('audio-capture addon loaded')"

      - name: Build + Package
        run: npm run ${{ matrix.script }} -- --publish=never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.os }}
          path: dist/**
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
