name: Build Client

on:
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            script: build:linux
          - os: windows-latest
            script: build:win
          - os: macos-latest
            script: build:mac

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Rebuild Electron modules
        run: npx electron-rebuild

      - name: Build + Package Electron app (TEST RELEASE)
        run: npm run ${{ matrix.script }} -- --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload packaged files (for testing)
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.script }}-${{ runner.os }}
          path: |
            dist/**
          if-no-files-found: error
